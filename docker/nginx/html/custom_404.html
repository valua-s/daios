<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Мошенник, уходи!</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background: radial-gradient(circle at 50% 30%, #1b2340, #0a0d1a 70%);
    color: #e7ecff;
    text-align: center;
    padding: 32px;
  }
  .card {
    max-width: 560px;
    width: 100%;
  }
  h1 {
    font-size: clamp(40px, 12vw, 96px);
    margin: 0;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #ff5d73, #ffb86b);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p.title { font-size: clamp(20px, 5vw, 30px); margin: 8px 0 0; font-weight: 700; }
  p.sub { color: #8d97c4; margin: 12px 0 0; font-size: 14px; }
  svg { width: clamp(180px, 60vw, 280px); height: auto; }
  .ip { margin-top: 18px; font-size: 12px; color: #5b6597; word-break: break-all; }
</style>
</head>
<body>
  <svg viewBox="0 0 240 220" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <ellipse cx="120" cy="205" rx="70" ry="10" fill="#000" opacity="0.35"/>
    <rect x="78" y="120" width="84" height="78" rx="14" fill="#2b3563"/>
    <circle cx="120" cy="78" r="46" fill="#f2c79b"/>

    <path d="M68 86 h104 v14 q-52 16 -104 0 z" fill="#0f1426"/>
    <circle cx="100" cy="88" r="13" fill="#0f1426"/>
    <circle cx="140" cy="88" r="13" fill="#0f1426"/>
    <rect x="113" y="86" width="14" height="6" rx="3" fill="#0f1426"/>
    <circle cx="100" cy="86" r="4" fill="#7de2ff"/>
    <circle cx="140" cy="86" r="4" fill="#7de2ff"/>
    <path d="M100 118 q20 16 40 0" stroke="#b5733f" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M150 150 q34 -6 40 22" stroke="#2b3563" stroke-width="16" fill="none" stroke-linecap="round"/>
    <text x="196" y="150" font-size="26" font-family="monospace" fill="#ffb86b">$</text>
  </svg>
  <div class="card">
    <h1>404</h1>
    <p class="title">Мошенник, уходи!</p>
    <p class="sub">Здесь нет ни .git, ни .env, ни твоих сокровищ. Иди сканируй кого-нибудь другого.</p>
    <p class="ip">Твой визит записан. Не баловаться.</p>
  </div>
</body>
</html>
