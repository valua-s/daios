server {
    listen 80;
    server_name _;

    # Редирект на HTTPS (раскомментировать после настройки SSL)
    return 301 https://$host$request_uri;

    location /api/ {
        proxy_pass         http://daios-api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://daios-frontend:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# HTTPS — раскомментировать после получения сертификата (certbot)
server {
    listen 443 ssl;
    server_name daios.sytes.net;

    ssl_certificate     /etc/letsencrypt/live/daios.sytes.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daios.sytes.net/privkey.pem;

    location /api/ {
        proxy_pass http://daios-api:8000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://daios-frontend:3000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
