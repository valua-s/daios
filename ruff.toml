line-length = 80
preview = true
target-version = "py313"
exclude = [
    "**/app/infra/db/migrations/",
    "**/migrations/",
    "**/__pycache__/",
    "**/.venv/",
    "**/app/infra/guards/",
    "**/tests",
    "**/infra/mock_usermanagement_service/",
    "**/infra/di/redis_users_cli.py",
    "**/model.py",
    "**/error**",
    "**/metrics**",
    "**struct**"
]


[format]
docstring-code-format = true
line-ending = "lf"
skip-magic-trailing-comma = true


[lint]
ignore = [
  "A005",
  "ANN401",
  "ASYNC109",
  "BLE001",
  "C901",
  "COM812",
  "CPY001",
  "D100",
  "D101",
  "D102",
  "D103",
  "D104",
  "D105",
  "D106",
  "D107",
  "D403",
  "D415",
  "D417",
  "DJ008",
  "DOC201",
  "DOC402",
  "DOC501",
  "E501",
  "ERA001",
  "FURB180",
  "ISC001",
  "N805",
  "PLR0904",
  "PLR0911",
  "PLR0912",
  "PLR0913",
  "PLR0914",
  "PLR0915",
  "PLR0916",
  "PLR0917",
  "PLR1702",
  "RUF001",
  "RUF002",
  "RUF003",
  "RUF006",
  "S301",
  "S110",
  "S112",
  "S308",
  "S311",
  "S403",
  "S404",
  "SIM105",
  "TD002",
  "TD003",
  "TRY400",
  "TC002",
  "TC001",
]
select = ["ALL"]
unfixable = ["RUF027", "T"]

[lint.flake8-self]
ignore-names = ["_name_", "_value_"]

[lint.flake8-tidy-imports]
ban-relative-imports = "all"

[lint.flake8-type-checking]
exempt-modules = []
runtime-evaluated-base-classes = [
  "app.models.Base",
  "app.schemas.FrozenModel",
  "pydantic.BaseModel",
  "pydantic.RootModel",
  "pydantic_settings.BaseSettings",
  "sqlalchemy.orm.DeclarativeBase",
]
runtime-evaluated-decorators = [
  "dishka.backend.core.litestar.inject",
  "dishka.provide",
  "litestar.get",
  "litestar.post",
  "pydantic.validate_call",
]
strict = true

[lint.isort]
combine-as-imports = true
required-imports = ["from __future__ import annotations"]
split-on-trailing-comma = false

[lint.pydocstyle]
convention = "google"

[lint.pyupgrade]
keep-runtime-typing = true